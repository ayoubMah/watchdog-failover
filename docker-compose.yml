services:

  victim-a:
    build: ./victim-app
    container_name: victim-a
    environment:
      - INSTANCE_ID=INSTANCE-A
    ports:
      - "18081:9995"

  victim-b:
    build: ./victim-app
    container_name: victim-b
    profiles: ["standby"]   # does not auto-start; watchdog triggers it via docker start
    environment:
      - INSTANCE_ID=INSTANCE-B
    ports:
      - "18082:9995"

  watchdog:
    build: ./watchdog-app
    container_name: watchdog
    ports:
      - "18083:9999"
    volumes:
      # Mount Docker socket so watchdog can control containers on the host
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - victim-a
